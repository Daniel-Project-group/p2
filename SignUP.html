<!DOCTYPE html>
<html>

<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="Login.css">
    <script src="signup.js" defer></script>
</head>

<body>

    <header>
    </header>

    <main>
        <div id="BOX1">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 32" width="180" height="32" id="Logo">
                <style>
                    @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500&amp;display=swap');

                    .wordmark {
                        font-family: 'Fraunces', Georgia, serif;
                        font-weight: 500;
                        font-size: 22px;
                        letter-spacing: -0.02em;
                        fill: #14140f;
                    }
                </style>
                <circle cx="11" cy="16" r="11" fill="#14140f" />
                <circle cx="11" cy="16" r="6" fill="#ff5b1f" />
                <text x="32" y="23" class="wordmark">Delegate</text>
            </svg>
            <h4 id="Welcome">Create an account</h4>
            <form action="signup.php" method="POST">
                <div style="display: flex; flex-direction: column;">
                    <label class="Email" for="Username">Username</label>
                    <input type="text" id="Username">
                    <label class="Email" for="Email">Email </label>
                    <input type="email" class="Email" id="Email" name="email" placeholder="you@example.com" required>

                    <label class="Password" for="Password">Password </label>
                    <input class="Password" type="password" id="password" name="password" placeholder="*******" required
                        minlength="5">

                    <label class="Password" for="ConfirmPassword">Confirm Password </label>
                    <input class="Password" type="password" id="confirmPassword" name="confirmPassword"
                        placeholder="*******" required minlength="5">

                    <input id="submit" type="submit" value="Sign Up">
                    <a href="signin.html">Already have an account? Sign in</a>
                </div>
            </form>

        </div>
    </main>

    <footer>
    </footer>

</body>

</html>
