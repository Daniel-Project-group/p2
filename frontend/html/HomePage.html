<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title> HomePage</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/HomePage.css">
</head>

<body>
    <div id="sidebar"></div>
    <script src="../js/navbar.js"></script>

    <main class = "Content">
        <div id="topbar">
            <div id="profile">
                <span id="userInitials">DB</span>

                <div id="dropdown">
                    <div class="dropdown-header">
                        <div id="dropdownUsername">Username</div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item">Settings</a>
                    <a href="#" class="dropdown-item logout" id="logoutBtn">Logout</a>
                </div>
            </div>

        </div>
        <h1 id="welcomeText">Welcome Back </h1>
        <div id="kpi-row">
            <div class="OpenTask">
                <h6> My open Task</h6>
                <p>4</p>
            </div>
            <div class="OpenTask">
                <h6> Progress</h6>
                <p>67%</p>
            </div>
            <div class="OpenTask">
                <h6> Days to deadline</h6>
                <p>23</p>
            </div>
        </div>
        <div class ="groupTasks">
            <h1>Group-tasks:</h1>
        <div class = "taskOutput">
            
        </div>
        </div>

        <script>
            document.getElementById('logoutBtn').addEventListener('click', function (event) {
                event.preventDefault();
                localStorage.removeItem('username');
                window.location.href = 'signin.html';
            });
            const username = localStorage.getItem("username");
            if (username) {
                document.getElementById("welcomeText").textContent = `Welcome Back ${username}`;
                document.getElementById("userInitials").textContent = username.substring(0, 2).toLocaleUpperCase();
                document.getElementById("dropdownUsername").textContent = username;
            }
            else {
                window.location.href = "signin.html";
            }
        </script>

    </main>
</body>



</html>
