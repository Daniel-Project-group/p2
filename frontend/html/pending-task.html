<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Tasks</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/pending-task.css">
</head>

<body>

<div class="Layout">
    <div id="sidebar"></div>
    <div id="topbar"></div>
    
    <script src="../js/navbar.js"></script>

    <main class="Content">

        <h1>Pending Tasks</h1>

        <div class="pending-grid">

            <div class="pending-card">
                <h3>Task title</h3>
                <p class="pending-description">Task description goes here</p>
                <p class="pending-creator">Suggested by: <strong>username</strong></p>
                <div class="pending-buttons">
                    <button class="accept-btn">Accept</button>
                    <button class="reject-btn">Reject</button>
                </div>
            </div>
        

        </div>

    </main>
</div>
<script src="../js/pending-tasks.js"></script>
</body>
</html>
