<!DOCTYPE html>
<html>

<head>
    <script src="../js/newtask.js" defer></script>
    <script src="../js/navbar.js" defer></script>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/NewTask.css">
    <link rel="stylesheet" href="../css/NewTaskBatch.css">

</head>

<body>

    <div id="topbar"></div>

    <main>

        <div class="NewTaskContainer">

            <!-- LEFT: form panel -->
            <section id="NEWTASKBOX" class="SprintFormPanel">
                <p id="sprintTitle">Sprint 1</p>
                <hr>

                <form id="taskForm">
                    <div class="form-group">
                        <label class="LABEL" for="TaskTitle">Task Title</label>
                        <input type="text" name="title" id="TaskTitle" placeholder="e.g. Write project documentation">
                    </div>

                    <div class="form-group">
                        <label class="LABEL" for="TaskDescription">Description</label>
                        <textarea name="description" id="TaskDescription"
                            placeholder="Describe what needs to be done..."></textarea>
                    </div>

                    <div class="form-group">
                        <label class="LABEL" for="Quantity">Number of people on this task</label>
                        <input type="number" id="Quantity" name="quantity" value="1" min="1" max="20">
                    </div>

                    <button type="submit" id="submit">Add Task</button>
                </form>
            </section>

            <!-- RIGHT: task cards -->
            <section class="TaskPanel">
                <h3 class="TaskPanelHeader">Tasks in this sprint</h3>
                <div class="TaskGrid" id="taskGrid">
                    <!-- Placeholder cards so you can see the layout. JS will replace these. -->
                    <div class="TaskCard">
                        <button class="TaskCardRemove" aria-label="Remove task">x</button>
                        <h4 class="TaskCardTitle">Task 1</h4>
                        <p class="TaskCardDescription">Short description of what needs to get done.</p>
                        <label class="TaskCardQuantity">
                            <input type="number" class="TaskCardQuantityInput" value="2" min="1" max="20">
                            <span>people</span>
                        </label>
                    </div>
                    <div class="TaskCard">
                        <button class="TaskCardRemove" aria-label="Remove task">x</button>
                        <h4 class="TaskCardTitle">Task 2</h4>
                        <p class="TaskCardDescription">Another description.</p>
                        <span class="TaskCardQuantity">1 person</span>
                    </div>
                    <div class="TaskCard">
                        <button class="TaskCardRemove" aria-label="Remove task">x</button>
                        <h4 class="TaskCardTitle">Task 3</h4>
                        <p class="TaskCardDescription">Yet another description that might be a bit longer to show how it wraps.</p>
                        <span class="TaskCardQuantity">3 people</span>
                    </div>
                    <div class="TaskCard">
                        <button class="TaskCardRemove" aria-label="Remove task">x</button>
                        <h4 class="TaskCardTitle">Task 4</h4>
                        <p class="TaskCardDescription">Description four.</p>
                        <span class="TaskCardQuantity">1 person</span>
                    </div>
                </div>
            </section>

        </div>

        <button id="delegateBtn" class="DelegateButton yellow">Delegate</button>

    </main>

</body>

</html>
