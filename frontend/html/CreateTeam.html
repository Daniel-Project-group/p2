<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Group</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/CreateTeam.css">
</head>
<body>
    <main class="page-container">
        <section class="form-box">
            <h1>Create Group</h1>
            <p>Create a new project group.</p>

            <label for="groupName">Group name</label>
            <input type="text" id="groupName" placeholder="Example: P2 Project Group">

            <label for="groupId">Group ID</label>
            <input type="text" id="groupId" placeholder="Example: group-001">

            <label for="programme">Which programme are you in?</label>
            <input type="text" id="programme" placeholder="Example: Computer Science">

            <label for="semester">Which semester are you on?</label>
            <input type="number" id="semester" placeholder="Example: 2" min="1" max="10">

            <label>Curriculum — provide a URL or upload a PDF</label>
            <input type="url" id="curriculumUrl" placeholder="https://...">
            <p style="text-align:center; margin: 4px 0;">or</p>
            <input type="file" id="curriculumFile" accept=".pdf">

            <button id="createGroupButton">Create group</button>
        </section>
    </main>

    <script src="../js/createTeam.js"></script>
</body>
</html>
