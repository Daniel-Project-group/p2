<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Group</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/CreateTeam.css">
</head>

<body>
    <main class="page-container">

       <section class="form-box">
    <h1>Create Group</h1>
    <p>Create a new project group.</p>

    <label for="groupName">Group name</label>
    <input 
        type="text" 
        id="groupName" 
        placeholder="Example: P2 Project Group"
    >

    <label for="groupId">Group ID</label>
    <input 
        type="text" 
        id="groupId" 
        placeholder="Example: group-001"
    >

    <label for="semester">Semester</label>
    <input 
        type="text" 
        id="semester" 
        placeholder = "2nd,3rd etc."
    >

    <label for="programme">Programme</label>
    <input 
        type="text" 
        id="programme" 
        placeholder="Psychology, cs etc."
    >

    <label for="curriculumUrl">Curriculum URL</label>
    <input 
        type="text" 
        id="curriculumUrl" 
        placeholder="Paste curriculum page URL"
    >

    <label for="curriculumFile">Curriculum pdf</label>
    <input 
        type="file" 
        id="curriculumFile" 
        accept="application/pdf"
    >

    <button id="createGroupButton">Create group</button>
</section>

    </main>

    <script src="../js/createTeam.js"></script>
</body>
</html>
