<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Calender</title>


    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/Calender.css">
</head>

<body>
    <div id="sidebar"></div>
    <div id="topbar"></div>

<div class="Layout">

<main class="Content">
   
    <header class="DashboardHeader">
        <div>
            <h1>Assignments due</h1>
            <p>Overview of upcoming tasks, deadlines and current progress.</p>
        </div>
    </header>
    
    <section class="SummaryCards">

        <div class="SummaryCard">
            <h3>Remaining tasks</h3>
            <p id="js-task-amount"></p>
            <ul id="js-remaning-tasks">
            </ul>
        </div>

    </section>
    
<section>
    <div id="current-year-month"></div>

    <div class="calendar-grid">
        <div class="calendar-header">Mon</div>
        <div class="calendar-header">Tue</div>
        <div class="calendar-header">Wed</div>
        <div class="calendar-header">Thu</div>
        <div class="calendar-header">Fri</div>
        <div class="calendar-header">Sat</div>
        <div class="calendar-header">Sun</div>

        <div id="calendarGrid" style="display:contents"></div>
    </div>

    <div class="calendar-nav">
        <button id="back-button">Back</button>
        <button id="next-button">Next</button>
    </div>



</section>

</main>


</div>

    <script src="../js/calender.js"></script>
    <script src="../js/navbar.js"></script>
</body>
</html>
