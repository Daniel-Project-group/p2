<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competence Profile</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/competence-profile.css">
</head>

<body>
    <div id="sidebar"></div>
    <div id="topbar"></div>

    <main class="Content">
    <div class="profile-card">
            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="progressText"></p>
            </div>

            <div id="questionBox">
                <p class="LABEL">Question <span id="questionNum">1</span></p>
                <h1 id="title"></h1>
                <p class="subtitle">Rate your proficiency and interest from 1 to 10</p>

                <div class="slider-section">
                    <div class="slider-header">
                        <label id="profQuestion">How good are you at this?</label>
                        <span class="slider-value" id="profValue">5</span>
                    </div>
                    <input type="range" min="1" max="10" value="5" id="profSlider">
                    <div class="labels">
                        <span>Beginner</span>
                        <span>Expert</span>
                    </div>
                </div>

                <div class="slider-section">
                    <div class="slider-header">
                        <label id="intQuestion">How interested are you?</label>
                        <span class="slider-value" id="intValue">5</span>
                    </div>
                    <input type="range" min="1" max="10" value="5" id="intSlider">
                    <div class="labels">
                        <span>Not interested</span>
                        <span>Love it</span>
                    </div>
                </div>
            </div>

            <div class="buttons">
                <button id="backBtn">Back</button>
                <button id="nextBtn">Next</button>
            </div>
    </div>
    </main>

<script src = "../js/navbar.js"></script>
<script src = "../js/competence.js"></script>

</body>

</html>
