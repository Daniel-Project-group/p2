<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> Competence Profile </title>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/navbar.css">
<link rel="stylesheet" href="../css/competence-profile.css">

</head>

<body>

    <div id="sidebar"></div>
    <script src="../js/navbar.js"></script>



<div class="Content">

<div class="container">

<div class="progress-wrapper">


<div class="progress-bar">

<div class="progress-fill" id="progressFill"></div>
</div>

<p id="progressText"></p>
</div>


<div id="questionBox">



    <h3> On a scale from 1-10, rate the competence</h3>
  
    <h1 id="title"> </h1>

    <p> Proficiency  </p>
    <input type="range" min="1" max="10" value="5" id="profSlider">
    <div class="labels">

<span>1</span>
<span>10</span>
</div>
    <p id="profValue">5</p>



<p> Interest </p>
    <input type="range" min="1" max="10" value="5" id="intSlider">
   
    <div class="labels">

<span>1</span>
<span>10</span>
</div>
    <p id="intValue">5</p>
    </div>

    <div class="buttons">
<button id="backBtn">Back</button>

<button id="nextBtn">Next</button>
    </div>



</div>


<script> 

const competences = [

    "Report Writing",
    "Algorithms",
    "Web development"

];


let index = 0;

const title = document.getElementById("title");

const profSlider = document.getElementById("profSlider");
const profValue = document.getElementById("profValue");

const intSlider = document.getElementById("intSlider");
const intValue = document.getElementById("intValue");

const nextBtn = document.getElementById("nextBtn");

const backBtn = document.getElementById("backBtn");

const answers = [];

const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");


function loadQuestion () {
title.textContent = competences[index];


if (answers[index]) {
profSlider.value = answers[index].proficiency;
intSlider.value = answers[index].interest;

profValue.textContent = answers[index].proficiency;
intValue.textContent = answers[index].interest;

} else { 

profSlider.value = 5;
intSlider.value = 5;


profValue.textContent = 5;
intValue.textContent = 5;
}

const percent = ((index + 1) / competences.length) * 100;
progressFill.style.width = percent + "%";

progressText.textContent = `${index + 1} / ${competences.length}`;

backBtn.disabled = index === 0;
if (index === competences.length - 1) {
    nextBtn.textContent = "Finish";
}else{ 
    nextBtn.textContent = "Next";

}

}

profSlider.addEventListener("input", () => {

    profValue.textContent = profSlider.value;
});


intSlider.addEventListener("input", () => {

    intValue.textContent = intSlider.value;
});


nextBtn.addEventListener("click", () => {

    answers[index] = {
        competence: competences[index],
        proficiency: profSlider.value,
        interest: intSlider.value
    };

index++;

if (index < competences.length) {
    loadQuestion();
} else { 
    console.log("Final DATA:", answers);

    document.getElementById("questionBox").innerHTML = "<h2> Competence profilings are saved  </h2>";
    nextBtn.style.display = "none";
    backBtn.style.display = "none";

}



    });
    backBtn.addEventListener("click", () => {
    if (index > 0) {
        index--;
        loadQuestion();
    }

});

    loadQuestion();
</script>


</body>

</html>
