<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="../css/Login.css">
    <script src="../js/login.js" defer></script>
</head>

<body>

    <header>
    </header>

    <main>
        <div id="BOX1">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 32" width="180" height="32" id="Logo">
                <style>
                    @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500&amp;display=swap');

                    .wordmark {
                        font-family: 'Fraunces', Georgia, serif;
                        font-weight: 500;
                        font-size: 22px;
                        letter-spacing: -0.02em;
                        fill: #14140f;
                    }
                </style>
                <circle cx="11" cy="16" r="11" fill="#14140f" />
                <circle cx="11" cy="16" r="6" fill="#ff5b1f" />
                <text x="32" y="23" class="wordmark">Delegate</text>
            </svg>
            <h4 id="Welcome">Welcome back</h4>
            <form action="index.php" method="POST">
                <div style="display: flex; flex-direction: column;">
                    <label class="Email" for="Email">Email </label>
                    <input type="email" class="Email" id="Email" name="email" placeholder="you@example.com" required>

                    <label class="Password" for="Password">Password </label>
                    <input class="Password" type="password" id="password" name="password" placeholder="*******" required
                        minlength="5">
                    <p id="Error"> </p>
                    <div id="RM">
                        <input id="checkbox" name="remember" type="checkbox">
                        <label for="checkbox">Remember Me</label>
                    </div>
                    <input id="submit" type="submit" value="Sign In">
                </div>
                <a href="SignUP.html"> Don't have an account? Sign up</a>
            </form>
        </div>
    </main>

    <footer>
    </footer>

</body>

</html>
