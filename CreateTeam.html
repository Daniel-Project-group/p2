<!DOCTYPE html>
<html>

<head>
    <script src="createteam.js" defer></script>
    <link rel="stylesheet" href="HomePage.css">
    <link rel="stylesheet" href="NewTask.css">
</head>

<body>
    <main>

        <div id="NEWTASKBOX">
            <p>Create New Team</p>
            <hr>

            <form id="teamForm">
                <div class="form-group">
                    <label class="LABEL" for="TeamName">Team Name</label>
                    <input type="text" name="name" id="TeamName" placeholder="e.g. P2 Group Project" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="LABEL" for="University">University</label>
                        <input type="text" id="University" name="university" placeholder="e.g. Aalborg University"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="LABEL" for="StudyLine">Study Line</label>
                        <input type="text" id="StudyLine" name="studyLine" placeholder="e.g. Software" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="LABEL" for="Semester">Semester</label>
                        <input type="number" id="Semester" name="semester" min="1" max="10" placeholder="e.g. 2"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="LABEL" for="Deadline">Project Deadline</label>
                        <input type="date" id="Deadline" name="deadline" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="LABEL" for="Curriculum">Curriculum Link</label>
                    <input type="url" id="Curriculum" name="curriculumLink" placeholder="https://moduler.aau.dk/...">
                </div>

                <button type="submit" id="submit">Create Team</button>
            </form>
        </div>

        <a href="PreHomePage.html" id="backButton">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            Back
        </a>
    </main>
</body>

</html>
