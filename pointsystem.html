<!DOCTYPE html>

<html>

<head>
<title> Qualification test </title>

<link rel="stylesheet" href="pointsystem.css">
<link rel="stylesheet" href="HomePage.css">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    background: #ccc;
    justify-content: center;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 300px;
}

input[type="range"] {

width: 100px;
margin-top: 10px;
}


.labels{
display: flex;
justify-content: space-between;
width: 10px;
}



</style>
</head>

<body>


<div class="container">

     <p> Choose your qualification. 1 is the worst and 10 is the best. This will help with delegation of tasks. </p>

<input type="range" min="0" max="10" step="1" value="5">

<div class="labels">
<span>1</span>
<span>2</span>
<span>3</span>
<span>4</span>
<span>5</span>
<span>6</span>
<span>7</span>
<span>8</span>
<span>9</span>
<span>10</span>
</div>

</div>

</body>

</html>
