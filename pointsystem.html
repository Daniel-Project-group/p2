<!DOCTYPE html>

<html>

<head>
<title> Competence Profile </title>

<link rel="stylesheet" href="pointsystem.css">
<link rel="stylesheet" href="HomePage.css">


<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
}

#SideBar {
    width: 250px;
    height: 100vh;
    background: #fff;
    border-right: 1px solid #ddd;
    padding: 20px;
    box-sizing: border-box;
    position: fixed;
    left: 0;
    top: 0;
}

#SideBar a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    margin-top: 8px;
    text-decoration: none;
    color: #333;
    border-radius: 8px;
    transition: 0.2s;
}

#SideBar a:hover {
    background: #f2f2f2;
}

.sidebar-button-active {
    background: #e6e6e6;
    font-weight: bold;   
}


#AddTask {
    margin-top: 20px;
    display: block;
    text-align: center;
    padding: 10px;
    background: #ff5b1f;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}


#AddTask:hover {
background: #e14d14;
}


.main {
    margin-left: 250px;
    flex: 1;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background: #ccc;
}

.container {
    width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.question {
    margin-bottom: 30px;
}

input[type="range"] {
    width: 100%;
    margin-top: 10px;
}


.labels{
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: 12px;
    color: #666;
}

#value {
    margin-top: 10px;
    font-weight: bold;
}

.progress-wrapper {
    width: 100%;
    margin-bottom: 20px;
    text-align: center;
}

.progress-bar {
    width: 100%;
    height: 10px;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
}

.progress-fill {

    height: 100%;
    width: 0%;
    background: #ff5b1f;
    transition: width 0.3s ease;

}

#progressText {
    margin-top: 5px;
    font-size: 14px;
    color: #555;
}

.buttons {
margin-top: 20px;
display: flex;
gap: 10px;

}

button {

    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

#backBtn {

    background: #ddd;
    
}

#nextBtn {

    background: #ff5b1f;
    color: white;
}

</style>
</head>

<body>

            <div id="SideBar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 32" width="180" height="32" id="Logo">

                        }
                    </style>
                    <circle cx="11" cy="16" r="11" fill="#14140f" />
                    <circle cx="11" cy="16" r="6" fill="#ff5b1f" />
                    <text x="32" y="23" class="wordmark">Delegate</text>
                </svg>
                <hr>
                <h5>Workspace</h5>
                <a href="" class="sidebarbuttonActive"> <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <rect x="2" y="2" width="5" height="5" stroke="currentColor" stroke-width="1.4" />
                        <rect x="9" y="2" width="5" height="5" stroke="currentColor" stroke-width="1.4" />
                        <rect x="2" y="9" width="5" height="5" stroke="currentColor" stroke-width="1.4" />
                        <rect x="9" y="9" width="5" height="5" stroke="currentColor" stroke-width="1.4" />
                    </svg> Dashboard </a>
                <a href="" class="SideBarButton"> <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <circle cx="5" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4" />
                        <path d="M1.5 13c0-2 1.5-3.5 3.5-3.5s3.5 1.5 3.5 3.5" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" />
                        <circle cx="11" cy="6" r="2" stroke="currentColor" stroke-width="1.4" />
                        <path d="M9 13c0-1.5 1-2.5 2.5-2.5S14 11.5 14 13" stroke="currentColor" stroke-width="1.4"

                    </svg> Group Tasks</a>

                <a href="" class="SideBarButton">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">

                    </svg>
                    My Tasks
                </a>
                <a class="SideBarButton"> <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <rect x="2" y="3" width="12" height="11" rx="1" stroke="currentColor" stroke-width="1.4" />
                        <path d="M2 6h12M5 1.5v3M11 1.5v3" stroke="currentColor" stroke-width="1.4"

                <a id="AddTask">+ Add Task</a>
            </div>


<div class="main">

<div class="container">

<div class="progress-wrapper">


<div class="progress-bar">

<div class="progress-fill" id="progressFill"></div>
</div>

<p id="progressText"></p>
</div>


<div id="questionBox">



    <h3> On a scale from 1-10, rate the competence</h3>
  
    <h1 id="title"> </h1>

    <p> Proficiency  </p>
    <input type="range" min="1" max="10" value="5" id="profSlider">
    <div class="labels">

<span>1</span>
<span>10</span>
</div>
    <p id="profValue">5</p>



<p> Interest </p>
    <input type="range" min="1" max="10" value="5" id="intSlider">
   
    <div class="labels">

<span>1</span>
<span>10</span>
</div>
    <p id="intValue">5</p>
    </div>

    <div class="buttons">
<button id="backBtn">Back</button>

<button id="nextBtn">Next</button>
    </div>



</div>


<script> 

const competences = [

    "Report Writing",
    "Algorithms",
    "Web development"

];


let index = 0;

const title = document.getElementById("title");

const profSlider = document.getElementById("profSlider");
const profValue = document.getElementById("profValue");

const intSlider = document.getElementById("intSlider");
const intValue = document.getElementById("intValue");

const nextBtn = document.getElementById("nextBtn");

const backBtn = document.getElementById("backBtn");

const answers = [];

const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");


function loadQuestion () {
title.textContent = competences[index];


if (answers[index]) {
profSlider.value = answers[index].proficiency;
intSlider.value = answers[index].interest;

profValue.textContent = answers[index].proficiency;
intValue.textContent = answers[index].interest;

} else { 

profSlider.value = 5;
intSlider.value = 5;


profValue.textContent = 5;
intValue.textContent = 5;
}

const percent = ((index + 1) / competences.length) * 100;
progressFill.style.width = percent + "%";

progressText.textContent = `${index + 1} / ${competences.length}`;

backBtn.disabled = index === 0;
if (index === competences.length - 1) {
    nextBtn.textContent = "Finish";
}else{ 
    nextBtn.textContent = "Next";

}

}

profSlider.addEventListener("input", () => {

    profValue.textContent = profSlider.value;
});


intSlider.addEventListener("input", () => {

    intValue.textContent = intSlider.value;
});


nextBtn.addEventListener("click", () => {

    answers[index] = {
        competence: competences[index],
        proficiency: profSlider.value,
        interest: intSlider.value
    };

index++;

if (index < competences.length) {
    loadQuestion();
} else { 
    console.log("Final DATA:", answers);

    document.getElementById("questionBox").innerHTML = "<h2> Competence profilings are saved  </h2>";
    nextBtn.style.display = "none";
    backBtn.style.display = "none";

}



    });
    backBtn.addEventListener("click", () => {
    if (index > 0) {
        index--;
        loadQuestion();
    }

});

    loadQuestion();
</script>


</body>

</html>
