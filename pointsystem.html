#SideBar {

#SideBar a {

}


#AddTask:hover {
background: #e14d14;
}


.main {

    justify-content: center;
    align-items: center;

    background: #ccc;
}

.container {
    width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.question {
    margin-bottom: 30px;
}

input[type="range"] {
    width: 100%;
    margin-top: 10px;
}


.labels{
    display: flex;
    justify-content: space-between;
    width: 100%;
}

#value {
margin-top: 10px;
font-weight: bold;
}

<script> 

const sliders = document.querySelectorAll("slider");


sliders.forEach(slider => {

const valueDisplay = slider.nextElementSibling;

slider.addEventListener("input", () => {

valueDisplay.textContent = slider.value;
});

});
      
    

</script>
