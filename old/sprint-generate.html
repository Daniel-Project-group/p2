<!DOCTYPE html>
<html>

<head>
    <script src="../js/sprint-generate.js" defer></script>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/sprint-generate.css">

</head>

<body>
    <main>

        <div id="SPRINTBOX">
            <p>Create New Sprint</p>
            <hr>

            <form id="sprintForm">
                <div class="form-group">
                    <label class="LABEL" for="SprintTitle">Sprint Title</label>
                    <input type="text" name="title" id="SprintTitle" placeholder="e.g. Sprint 1">
                </div>

                <div class="form-group">
                    <label class="LABEL" for="SprintDescription">Description</label>
                    <textarea name="description" id="SprintDescription"
                        placeholder="Describe the goal of this sprint..."></textarea>
                </div>

                <div class="form-group">
                    <label class="LABEL" for="EndDate">End Date</label>
                    <input type="date" id="EndDate" name="enddate">
                </div>

                <button type="submit" id="submit">Create Sprint</button>
            </form>
        </div>
        <a href="HomePage.html" id="backButton">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />

            </svg>
            Back
        </a>
    </main>
</body>

</html>
