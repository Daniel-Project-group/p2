<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="HomePage.css">
    <title> HomePage</title>
</head>

<body>
    <header>

        <main>
            <div id="SideBar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 32" width="180" height="32" id="Logo">
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500&amp;display=swap');

                        .wordmark {
                            font-family: 'Fraunces', Georgia, serif;
                            font-weight: 500;
                            font-size: 22px;
                            letter-spacing: -0.02em;
                            fill: #14140f;
                        }
                    </style>
                    <circle cx="11" cy="16" r="11" fill="#14140f" />
                    <circle cx="11" cy="16" r="6" fill="#ff5b1f" />
                    <text x="32" y="23" class="wordmark">Delegate</text>
                </svg>
                <hr>
                <h5>Workspace</h5>
                <a href="" class="sidebarbuttonActive"> <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <rect x="2" y="2" width="5" height="5" stroke="currentColor" stroke-width="1.4" />
                        <rect x="9" y="2" width="5" height="5" stroke="currentColor" stroke-width="1.4" />
                        <rect x="2" y="9" width="5" height="5" stroke="currentColor" stroke-width="1.4" />
                        <rect x="9" y="9" width="5" height="5" stroke="currentColor" stroke-width="1.4" />
                    </svg> Dashboard </a>
                <a href="" class="SideBarButton"> <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <circle cx="5" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4" />
                        <path d="M1.5 13c0-2 1.5-3.5 3.5-3.5s3.5 1.5 3.5 3.5" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" />
                        <circle cx="11" cy="6" r="2" stroke="currentColor" stroke-width="1.4" />
                        <path d="M9 13c0-1.5 1-2.5 2.5-2.5S14 11.5 14 13" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" />
                    </svg> Group Tasks</a>

                <a href="" class="SideBarButton">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M3 4h10M3 8h10M3 12h7" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" />
                    </svg>
                    My Tasks
                </a>
                <a class="SideBarButton"> <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <rect x="2" y="3" width="12" height="11" rx="1" stroke="currentColor" stroke-width="1.4" />
                        <path d="M2 6h12M5 1.5v3M11 1.5v3" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" />
                    </svg> Calander</a>
                <a href="PendingTask.html" class="SideBarButton"> <svg width="16" height="16" viewBox="0 0 16 16"
                        fill="none">
                        <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4" />
                        <path d="M8 4.5V8L10 9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg> Pending Task </a>
                <a id="AddTask" href="NewTask.html">+ Add Task</a>
            </div>
        </main>
    </header>

    <main id="Content">
        <div id="topbar">
            <div id="profile">
                <span id="userInitials">DB</span>

                <div id="dropdown">
                    <div class="dropdown-header">
                        <div id="dropdownUsername">Username</div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item">Settings</a>
                    <a href="#" class="dropdown-item logout" id="logoutBtn">Logout</a>
                </div>
            </div>

        </div>
        <h1 id="welcomeText">Welcome Back </h1>
        <div id="kpi-row">
            <div class="OpenTask">
                <h6> My open Task</h6>
                <p>4</p>
            </div>
            <div class="OpenTask">
                <h6> Progress</h6>
                <p>67%</p>
            </div>
            <div class="OpenTask">
                <h6> Days to deadline</h6>
                <p>23</p>
            </div>
        </div>

        <script>
            document.getElementById('logoutBtn').addEventListener('click', function (event) {
                event.preventDefault();
                localStorage.removeItem('username');
                window.location.href = 'signin.html';
            });
            const username = localStorage.getItem("username");
            if (username) {
                document.getElementById("welcomeText").textContent = `Welcome Back ${username}`;
                document.getElementById("userInitials").textContent = username.substring(0, 2).toLocaleUpperCase();
                document.getElementById("dropdownUsername").textContent = username;
            }
            else {
                window.location.href = "signin.html";
            }
        </script>

    </main>
</body>



</html>
